schema_version: 1

context:
  name: FireWorks
  version: "2.1.3"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | lower }}-${{ version }}.tar.gz
  sha256: e4dc151d3762cc3cdb57c23a5cdc69967ef692b440ec9cb1e98bdc3aa957cf10

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - pip
    - ruamel.yaml >=0.15.35
    - pymongo >=3.3.0
    - Jinja2 >=2.8.0
    - six >=1.10.0
    - monty >=1.0.1
    - python-dateutil >=2.5.3
    - tabulate >=0.7.5
    - flask >=0.11.1
    - flask-paginate >=0.4.5
    - gunicorn >=19.6.0
    - tqdm >=4.8.4
    - paramiko >=2.4.2
    - pathlib2
    - requests >=2.01
    - fabric >=2.3.1
    - matplotlib-base >=2.0.1
    - python-igraph >=0.7.1
    - importlib-metadata
    - cryptography <46

tests:
  - python:
      imports:
        - fireworks
      pip_check: true
      python_version: ${{ python_min }}

about:
  license: BSD-3-Clause-LBNL
  license_file: LICENSE
  summary: The Fireworks Workflow Management Repo.
  description: |
    FireWorks stores, executes, and manages calculation workflows.
  homepage: https://materialsproject.github.io/fireworks
  repository: https://github.com/materialsproject/fireworks
  documentation: https://materialsproject.github.io/fireworks/

extra:
  recipe-maintainers:
    - jan-janssen
